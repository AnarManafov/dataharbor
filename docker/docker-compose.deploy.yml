# DataHarbor - Production Deployment (Pre-built Images from GHCR)
# This file is for DEPLOYING to production servers using pre-built images.
# Images are built by CI and pushed to GitHub Container Registry (GHCR).
#
# Usage:
#   # Deploy specific version (production)
#   VERSION=0.14.6 docker compose -f docker-compose.deploy.yml up -d
#
#   # Deploy dev build with auto-pull (staging)
#   VERSION=dev PULL_POLICY=always docker compose -f docker-compose.deploy.yml up -d
#
#   # Force pull latest images
#   docker compose -f docker-compose.deploy.yml up -d --pull always
#
# Required environment variables (set in .env file):
#   - SSL_CERT_PATH, SSL_KEY_PATH: TLS certificates for nginx
#   - XROOTD_DATA_DIR: Host directory to serve via XRootD
#   - XRD_CERT_PATH, XRD_KEY_PATH: XRootD TLS certificates
#   - XRD_MAPFILE_PATH: Token-to-user mapping file
#   - OIDC_*: Authentication configuration

services:
  backend:
    # Multi-arch image - pulls native arm64 or amd64 automatically
    image: ghcr.io/anarmanafov/dataharbor-backend:${VERSION:-latest}
    pull_policy: ${PULL_POLICY:-missing}
    container_name: dataharbor-backend
    restart: unless-stopped

    environment:
      DATAHARBOR_ENV: production

      # Server
      DATAHARBOR_SERVER_ADDRESS: ":8080"
      DATAHARBOR_SERVER_DEBUG: "false"

      # XRootD (local container service)
      DATAHARBOR_XRD_HOST: ${XRD_HOST:-xrootd}
      DATAHARBOR_XRD_PORT: ${XRD_PORT:-1094}
      DATAHARBOR_XRD_INITIAL_DIR: ${XRD_INITIAL_DIR:-/}
      DATAHARBOR_XRD_ENABLE_ZTN: ${XRD_ENABLE_ZTN:-true}

      # Authentication
      DATAHARBOR_AUTH_ENABLED: ${AUTH_ENABLED:-true}
      DATAHARBOR_AUTH_OIDC_ISSUER: ${OIDC_ISSUER}
      DATAHARBOR_AUTH_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      DATAHARBOR_AUTH_OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      DATAHARBOR_AUTH_OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL}
      DATAHARBOR_AUTH_OIDC_SESSION_SECRET: ${OIDC_SESSION_SECRET}

      # Logging
      DATAHARBOR_LOGGING_LEVEL: ${LOG_LEVEL:-info}
      DATAHARBOR_LOGGING_FORMAT: json

    volumes:
      - ./config/application.yaml:/app/config/application.yaml:ro
      - ${XRD_CLIENT_CERT_PATH:-./certs/client}:/app/certs:ro
      - backend-logs:/app/log

    networks:
      - dataharbor-network

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    depends_on:
      - frontend
      - xrootd

  frontend:
    # Multi-arch image - pulls native arm64 or amd64 automatically
    image: ghcr.io/anarmanafov/dataharbor-frontend:${VERSION:-latest}
    pull_policy: ${PULL_POLICY:-missing}
    container_name: dataharbor-frontend
    restart: unless-stopped

    networks:
      - dataharbor-network

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  nginx:
    # Multi-arch image - pulls native arm64 or amd64 automatically
    # Prod config baked in: proxies to static frontend on port 80
    image: ghcr.io/anarmanafov/dataharbor-nginx:${VERSION:-latest}
    pull_policy: ${PULL_POLICY:-missing}
    container_name: dataharbor-nginx
    restart: unless-stopped

    ports:
      - "443:443"

    volumes:
      - ${SSL_CERT_PATH}:/etc/nginx/ssl/server.crt:ro
      - ${SSL_KEY_PATH}:/etc/nginx/ssl/server.key:ro
      - nginx-logs:/var/log/nginx

    networks:
      - dataharbor-network

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/health",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

    depends_on:
      - backend
      - frontend

  # XRootD Server for Production
  # Serves data from host filesystem (e.g., Lustre, GPFS, local storage)
  # Uses production-optimized image with external mounts
  xrootd:
    platform: linux/amd64 # Required - XRootD packages only available for x86_64
    image: ghcr.io/anarmanafov/dataharbor-xrootd:${VERSION:-latest}
    pull_policy: ${PULL_POLICY:-missing}
    container_name: dataharbor-xrootd-prod
    restart: unless-stopped
    # Override entrypoint to bypass dev entrypoint in current GHCR image
    # Once GHCR images are rebuilt with Dockerfile.prod, this can be removed
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Starting XRootD in production mode..."
        mkdir -p /var/spool/xrootd /var/run/xrootd/certs /var/log/xrootd
        chown -R xrootd:xrootd /var/spool/xrootd /var/run/xrootd /var/log/xrootd 2>/dev/null || true
        # Copy user-provided certs and fix permissions (Docker Desktop doesn't preserve Unix perms)
        cp /var/run/xrootd/certs-user/hostcert.pem /var/run/xrootd/certs/hostcert.pem
        cp /var/run/xrootd/certs-user/hostkey.pem /var/run/xrootd/certs/hostkey.pem
        chmod 644 /var/run/xrootd/certs/hostcert.pem
        chmod 600 /var/run/xrootd/certs/hostkey.pem
        chown xrootd:xrootd /var/run/xrootd/certs/*
        exec runuser -u xrootd -- /usr/bin/xrootd -c /etc/xrootd/xrootd-prod.cfg -n xrootd

    environment:
      XROOTD_HOSTNAME: ${XRD_HOST:-xrootd}
      TZ: ${TZ:-UTC}

    volumes:
      # XROOTD CONFIGURATION (override baked-in config with updated version)
      - ./xrootd/configs/xrootd-prod.cfg:/etc/xrootd/xrootd-prod.cfg:ro
      - ./xrootd/configs/scitokens_prod.cfg:/etc/xrootd/scitokens_prod.cfg:ro

      # DATA DIRECTORY - Host filesystem to serve
      - type: bind
        source: ${XROOTD_DATA_DIR}
        target: /data
        bind:
          propagation: rslave

      # TLS CERTIFICATES (mounted to certs-user, copied with fixed permissions to certs)
      - ${XRD_CERT_PATH}:/var/run/xrootd/certs-user/hostcert.pem:ro
      - ${XRD_KEY_PATH}:/var/run/xrootd/certs-user/hostkey.pem:ro

      # USER MAPFILE
      - ${XRD_MAPFILE_PATH}:/etc/xrootd/mapfile:ro

      # LOGS
      - ${XROOTD_LOG_DIR:-./logs/xrootd}:/var/log/xrootd:rw

      # CA CERTIFICATES - Required for TLS verification in production
      # For grid computing: /etc/grid-security/certificates
      # For system CAs: /etc/ssl/certs or /etc/pki/tls/certs
      #
      # STAGING/TESTING: Comment out this line AND set 'xrd.tlsca noverify' in xrootd-prod.cfg
      - ${CA_CERTS_PATH:-/etc/ssl/certs}:/etc/grid-security/certificates:ro

    # Port 1094 is NOT exposed externally - only accessible by backend via internal network
    # If external XRootD access is needed, uncomment:
    # ports:
    #   - "${XRD_PORT:-1094}:1094"

    networks:
      - dataharbor-network

    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc:
        soft: 32768
        hard: 32768

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 5 xrdfs localhost:1094 query config version || exit 1",
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

networks:
  dataharbor-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  backend-logs:
  nginx-logs:
