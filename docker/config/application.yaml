# ============================================
# DataHarbor Backend Configuration (Docker)
# ============================================
# This is a template configuration file for Docker deployment
# Environment variables will override these values
# ============================================

env: production

server:
  address: ":8080"
  debug: false
  shutdown_timeout: 30s
  cors:
    allow_credentials: true
    allow_headers:
      - Origin
      - Content-Length
      - Content-Type
      - Authorization
    allow_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allow_origins:
      - https://localhost
  ssl:
    enabled: false  # SSL is handled by nginx gateway

logging:
  level: info
  format: json
  console:
    enabled: true
    level: info
    format: json
  file:
    enabled: false

xrd:
  # These values are overridden by environment variables
  host: "${DATAHARBOR_XRD_HOST}"
  port: ${DATAHARBOR_XRD_PORT}
  initial_dir: "/"
  enable_ztn: true
  client_cert: ""
  client_key: ""

frontend:
  url: "https://localhost"
  dist_dir: "dist"
  asset_paths: []

auth:
  enabled: true
  skip_auth_paths:
    - "/health"
    - "/api/auth/login"
    - "/api/auth/callback"
  oidc:
    # These values are overridden by environment variables
    issuer: "${DATAHARBOR_AUTH_OIDC_ISSUER}"
    client_id: "${DATAHARBOR_AUTH_OIDC_CLIENT_ID}"
    client_secret: "${DATAHARBOR_AUTH_OIDC_CLIENT_SECRET}"
    discovery_url: "${DATAHARBOR_AUTH_OIDC_DISCOVERY_URL}"
    session_secret: "${DATAHARBOR_AUTH_OIDC_SESSION_SECRET}"
    allowed_roles:
      - "xrootd-user"
    token_refresh_buffer_sec: 60
