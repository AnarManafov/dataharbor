# DataHarbor - Development Docker Compose
# Includes: Backend, Frontend, Nginx Gateway, XRootD Server
#
# Setup: Copy .env.example to .env and set HOST_PROJECT_ROOT to your local repo path

services:
  # Generates self-signed certificates for development (runs once and exits)
  cert-init:
    build:
      context: ..
      dockerfile: docker/cert-init/Dockerfile
    image: dataharbor-cert-init:dev
    container_name: dataharbor-cert-init-dev
    volumes:
      - shared-certs:/certs:rw
    networks:
      - dataharbor-network

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
      target: builder # Use builder stage for hot reload support
    image: dataharbor-backend:dev
    container_name: dataharbor-backend-dev
    restart: unless-stopped
    command: go run . -config /app/config/application.yaml

    environment:
      DATAHARBOR_ENV: development
      DATAHARBOR_SERVER_ADDRESS: ":8080"
      DATAHARBOR_SERVER_DEBUG: "true"

      # XRootD configuration (local container)
      DATAHARBOR_XRD_HOST: xrootd
      DATAHARBOR_XRD_PORT: 1094
      DATAHARBOR_XRD_INITIAL_DIR: /data
      DATAHARBOR_XRD_ENABLE_ZTN: "true"

      # Authentication
      DATAHARBOR_AUTH_ENABLED: ${AUTH_ENABLED:-true}
      DATAHARBOR_AUTH_OIDC_ISSUER: ${OIDC_ISSUER}
      DATAHARBOR_AUTH_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      DATAHARBOR_AUTH_OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      DATAHARBOR_AUTH_OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL}
      DATAHARBOR_AUTH_OIDC_SESSION_SECRET: ${OIDC_SESSION_SECRET}

      # Frontend URL - must be HTTPS for OAuth redirect validation
      DATAHARBOR_FRONTEND_URL: "https://localhost"

      # Logging
      DATAHARBOR_LOGGING_LEVEL: debug
      DATAHARBOR_LOGGING_CONSOLE_ENABLED: "true"
      DATAHARBOR_LOGGING_CONSOLE_FORMAT: text
      DATAHARBOR_LOGGING_FORMAT: text

    volumes:
      - ${HOST_PROJECT_ROOT}/app:/build:cached
      - ${HOST_PROJECT_ROOT}/app/config:/app/config:ro
      - backend-logs:/app/log

    # Backend API only accessible through nginx gateway (not exposed directly)
    networks:
      - dataharbor-network

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8080/health",
        ]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    depends_on:
      xrootd:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile.dev
    image: dataharbor-frontend:dev
    container_name: dataharbor-frontend-dev
    restart: unless-stopped

    environment:
      NODE_ENV: development
      VITE_SSL_KEY: /app/certs/server.key
      VITE_SSL_CERT: /app/certs/server.crt

    volumes:
      - ${HOST_PROJECT_ROOT}/web:/app:cached
      - frontend-node-modules:/app/node_modules
      - shared-certs:/app/certs:ro

    # Frontend accessible only through nginx gateway (not exposed directly)
    networks:
      - dataharbor-network

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "--no-check-certificate",
          "https://127.0.0.1:5173/",
        ]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    depends_on:
      cert-init:
        condition: service_completed_successfully

  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
      target: dev # Uses dataharbor-dev.conf (Vite dev server on port 5173 with HMR)
    image: dataharbor-nginx:dev
    container_name: dataharbor-nginx-dev
    restart: unless-stopped

    ports:
      - "443:443" # Only HTTPS exposed - clients use https://localhost

    volumes:
      - shared-certs:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx

    networks:
      - dataharbor-network

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80/health",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

    depends_on:
      cert-init:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  # XRootD server for local development
  xrootd:
    platform: linux/amd64 # Required - XRootD packages not available for ARM64
    build:
      context: ..
      dockerfile: docker/xrootd/Dockerfile
    image: dataharbor-xrootd:dev
    container_name: dataharbor-xrootd-dev
    restart: unless-stopped

    environment:
      XROOTD_HOSTNAME: xrootd
      TZ: Europe/Berlin

    volumes:
      # Use XROOTD_DATA_DIR from .env if set, otherwise use named volume
      # Named volume provides proper Unix permissions; bind mount allows host access
      - ${XROOTD_DATA_DIR:-xrootd-data}:/data:rw

      # Entrypoint copies shared certs with proper xrootd:xrootd ownership
      - shared-certs:/var/run/xrootd/certs-shared:ro
      - xrootd-logs:/var/log/xrootd

    ports:
      - "1094:1094"

    networks:
      - dataharbor-network

    healthcheck:
      test:
        ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/1094' || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

    depends_on:
      cert-init:
        condition: service_completed_successfully

networks:
  dataharbor-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  xrootd-data:
  xrootd-logs:
  shared-certs: # Generated by cert-init, used by nginx/frontend/xrootd
  nginx-logs:
  backend-logs:
  frontend-node-modules:
