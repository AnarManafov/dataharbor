# DataHarbor - Production Docker Compose
# Services: Backend, Frontend, Nginx Gateway, XRootD Server
# XRootD runs locally in container, serving host filesystem (Lustre/GPFS/local storage)

services:
  backend:
    # Multi-arch build supported (Go cross-compiles natively)
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    image: dataharbor-backend:latest
    container_name: dataharbor-backend
    restart: unless-stopped

    environment:
      DATAHARBOR_ENV: production

      # Server
      DATAHARBOR_SERVER_ADDRESS: ":8080"
      DATAHARBOR_SERVER_DEBUG: "false"
      DATAHARBOR_SERVER_CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://localhost}
      DATAHARBOR_FRONTEND_URL: ${FRONTEND_URL:-https://localhost}

      # XRootD (local container service)
      DATAHARBOR_XRD_HOST: ${XRD_HOST:-xrootd}
      DATAHARBOR_XRD_PORT: ${XRD_PORT:-1094}
      DATAHARBOR_XRD_INITIAL_DIR: ${XRD_INITIAL_DIR:-/}
      DATAHARBOR_XRD_ENABLE_ZTN: ${XRD_ENABLE_ZTN:-true}

      # Authentication
      DATAHARBOR_AUTH_ENABLED: ${AUTH_ENABLED:-true}
      DATAHARBOR_AUTH_OIDC_ISSUER: ${OIDC_ISSUER}
      DATAHARBOR_AUTH_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      DATAHARBOR_AUTH_OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      DATAHARBOR_AUTH_OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL}
      DATAHARBOR_AUTH_OIDC_SESSION_SECRET: ${OIDC_SESSION_SECRET}

      # Logging
      DATAHARBOR_LOGGING_LEVEL: ${LOG_LEVEL:-info}
      DATAHARBOR_LOGGING_FORMAT: json

    volumes:
      - ${XRD_CLIENT_CERT_PATH:-./certs/client}:/app/certs:ro # For XRootD ZTN TLS client auth
      - backend-logs:/app/log

    networks:
      - dataharbor-network

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8080/health",
        ]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    depends_on:
      - frontend
      - xrootd

  frontend:
    # Multi-arch build supported (Node.js + nginx both have arm64 images)
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    image: dataharbor-frontend:latest
    container_name: dataharbor-frontend
    restart: unless-stopped

    networks:
      - dataharbor-network

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80/",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  nginx:
    # Multi-arch build supported (nginx has arm64 images)
    # Prod config baked in: proxies to static frontend on port 80
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
      target: prod # Self-contained with prod config baked in
    image: dataharbor-nginx:latest
    container_name: dataharbor-nginx
    restart: unless-stopped

    ports:
      - "443:443" # Only HTTPS exposed - clients use https://yourdomain.com

    volumes:
      - ${SSL_CERT_PATH}:/etc/nginx/ssl/server.crt:ro
      - ${SSL_KEY_PATH}:/etc/nginx/ssl/server.key:ro
      - nginx-logs:/var/log/nginx

    networks:
      - dataharbor-network

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80/health",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

    depends_on:
      - backend
      - frontend

  # XRootD Server for Production
  # Serves data from host filesystem (e.g., Lustre, GPFS, local storage)
  # Uses host-provided TLS certificates and mapfile for user authentication
  xrootd:
    platform: linux/amd64 # Required - XRootD packages not available for ARM64
    build:
      context: ..
      dockerfile: docker/xrootd/Dockerfile.prod # Production-optimized Dockerfile
    image: dataharbor-xrootd:latest
    container_name: dataharbor-xrootd-prod
    restart: unless-stopped
    # Production entrypoint validates mounts and starts XRootD
    command:
      ["/usr/bin/xrootd", "-c", "/etc/xrootd/xrootd-prod.cfg", "-n", "xrootd"]

    environment:
      XROOTD_HOSTNAME: ${XRD_HOST:-xrootd}
      TZ: ${TZ:-UTC}
      # SciTokens: OIDC issuer and audience for token validation
      SCITOKENS_ISSUER: ${OIDC_ISSUER}
      SCITOKENS_AUDIENCE: ${SCITOKENS_AUDIENCE:-${OIDC_ISSUER}}
      # TLS CA verification (set to false for self-signed certs in staging/testing)
      XROOTD_TLS_CA_VERIFY: ${XROOTD_TLS_CA_VERIFY:-true}

    volumes:
      # ==========================================
      # DATA DIRECTORY - Host filesystem to serve
      # ==========================================
      # For Lustre/parallel filesystems: Use bind mount with proper propagation
      # For local storage: Standard bind mount works fine
      - type: bind
        source: ${XROOTD_DATA_DIR}
        target: /data
        bind:
          propagation: rslave # Required for Lustre/NFS - ensures mount changes propagate
        # read_only: false  # Set to true for read-only XRootD export

      # ==========================================
      # TLS CERTIFICATES - From host system
      # ==========================================
      # User-provided certs mounted to certs-user, entrypoint copies with fixed permissions
      # This handles Docker Desktop (macOS/Windows) not preserving Unix file permissions
      - ${XRD_CERT_PATH}:/var/run/xrootd/certs-user/hostcert.pem:ro
      - ${XRD_KEY_PATH}:/var/run/xrootd/certs-user/hostkey.pem:ro

      # ==========================================
      # CA CERTIFICATES - Required for TLS verification
      # Not needed when XROOTD_TLS_CA_VERIFY=false (testing/staging)
      - ${CA_CERTS_PATH:-/etc/ssl/certs}:/etc/grid-security/certificates:ro

      # ==========================================
      # USER MAPFILE - Token-to-Unix-user mapping
      # ==========================================
      # CRITICAL: UIDs in mapfile MUST match filesystem UIDs (especially for Lustre/NFS)
      # Example: {"sub": "username", "result": "unixuser"}
      # The "result" user must exist on host and have proper permissions on XROOTD_DATA_DIR
      # Long-form bind ensures Docker fails (instead of creating a directory)
      # if the host file is missing
      - type: bind
        source: ${XRD_MAPFILE_PATH}
        target: /etc/xrootd/mapfile
        read_only: true
        bind:
          create_host_path: false

      # ==========================================
      # LOGS - Persistent on host for monitoring
      # ==========================================
      - ${XROOTD_LOG_DIR:-./logs/xrootd}:/var/log/xrootd:rw

    # Port 1094 is NOT exposed externally - only accessible by backend via internal network
    # If external XRootD access is needed, uncomment:
    # ports:
    #   - "${XRD_PORT:-1094}:1094"

    networks:
      - dataharbor-network

    # ==========================================
    # RESOURCE LIMITS (Optional but recommended)
    # ==========================================
    # Uncomment to prevent XRootD from consuming all host resources
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '${XRD_CPU_LIMIT:-4.0}'
    #       memory: ${XRD_MEM_LIMIT:-8G}
    #     reservations:
    #       cpus: '${XRD_CPU_RESERVE:-1.0}'
    #       memory: ${XRD_MEM_RESERVE:-2G}

    # ==========================================
    # SECURITY OPTIONS
    # ==========================================
    # Uncomment if SELinux/AppArmor blocks access to host filesystem
    # security_opt:
    #   - label:disable  # Disable SELinux confinement for this container
    #   - apparmor:unconfined  # Disable AppArmor confinement

    # ==========================================
    # ULIMITS - File descriptor limits
    # ==========================================
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc:
        soft: 32768
        hard: 32768

    healthcheck:
      # Enhanced healthcheck using xrdfs query instead of just TCP check
      test:
        [
          "CMD-SHELL",
          "timeout 5 xrdfs 127.0.0.1:1094 query config version || exit 1",
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

networks:
  dataharbor-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  backend-logs:
  nginx-logs:
