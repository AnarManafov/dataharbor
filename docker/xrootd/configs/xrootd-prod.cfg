# ============================================
# XRootD TLS Server Configuration
# Production Environment
# ============================================

# ============================================
# Export and Path Mapping
# ============================================
# Export root path - clients see "/" as the root
all.export /

# Map client path "/" to container path "/data"
# This allows XROOTD_DATA_DIR to be mounted at /data but accessed as /
oss.localroot /data

# ============================================
# Security Library - REQUIRED for sec.protocol/sec.protbind
# ============================================
# Load the security library that provides sec.protocol and sec.protbind directives
# CRITICAL: Must be loaded BEFORE sec.protocol and sec.protbind directives
xrootd.seclib libXrdSec.so

# ============================================
# TLS Configuration for ZTN Protocol
# ============================================
# XRootD requires TLS certificate for ZTN protocol
# Using separate certificate and key files mounted from host
xrd.tls /var/run/xrootd/certs/hostcert.pem /var/run/xrootd/certs/hostkey.pem

# ============================================
# CA Certificate Verification
# ============================================
# Controlled by XROOTD_TLS_CA_VERIFY env var (default: true)
# The entrypoint script writes the appropriate directive to
# /etc/xrootd/tlsca.cfg which is included here.
#
# XROOTD_TLS_CA_VERIFY=true  -> xrd.tlsca certdir /etc/grid-security/certificates
# XROOTD_TLS_CA_VERIFY=false -> xrd.tlsca noverify  (TESTING ONLY!)
set tlscacfg = /etc/xrootd/tlsca.cfg
continue $tlscacfg

# CRITICAL: Enable TLS for ALL operations (login AND session) because ZTN protocol
# requires TLS for authentication itself (unlike GSI which conflicts with TLS)
# Using 'all' instead of 'session' to ensure login is also TLS-encrypted
xrootd.tls all

# ============================================
# ZTN Protocol for Native Port 1094
# ============================================
# IMPORTANT: sec.protocol MUST come BEFORE sec.protbind
#
# XRootD Security Architecture with ZTN + SciTokens:
# 1. AUTHENTICATION (sec.protocol ztn): Receives bearer token and stores in Entity.creds
# 2. AUTHORIZATION (ofs.authlib): SciTokens validates token, extracts username, sets request.name
# 3. MULTIUSER (ofs.osslib): Reads request.name attribute and switches UID
#
# CRITICAL: ZTN protocol requires the SciTokens plugin to be loaded
# We must specify the tokenlib parameter to point to libXrdAccSciTokens.so
sec.protocol ztn -tokenlib libXrdAccSciTokens.so
sec.protbind * only ztn

# ============================================
# Multi-User Filesystem Plugin
# ============================================
# CRITICAL: This must come BEFORE ofs.authlib
# The multiuser plugin changes filesystem UID/GID based on authenticated username
# It reads the username from the XrdSecEntity (set by SciTokens via request.name)
# and uses Linux capabilities to perform filesystem operations as that user
# NOTE: This is an OSS plugin (Object Storage System), not an SFS plugin
ofs.osslib ++ libXrdMultiuser.so default

# Optional: Set umask for created files/directories (e.g., 0022 = rw-r--r--)
multiuser.umask 0022

# ============================================
# Authorization with SciTokens
# ============================================
# SciTokens handles authentication AND authorization
# Token validation + user mapping via scitokens_prod.cfg and mapfile
# Using ofs.authorize to load default authorization system
# Then replace it with SciTokens (no ++ = SciTokens is the ONLY authz)
ofs.authorize
ofs.authlib libXrdAccSciTokens.so config=/etc/xrootd/scitokens_prod.cfg

# ============================================
# Trace/Debug Configuration - Minimal logging for production
# ============================================
# Enable ALL tracing to see complete server behavior
#xrd.trace all
# Enable detailed token processing logs
scitokens.trace all

# Only log authentication events and errors
xrootd.trace auth login

# TLS errors only
xrd.trace tls
