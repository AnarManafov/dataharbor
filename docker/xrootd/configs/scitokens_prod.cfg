# ============================================
# SciTokens Configuration - Production
# ============================================
# Secure configuration for production environments
# - No default user fallback (unmapped tokens are denied)
# - Strict audience validation
# - Map subject claim to Unix users
# ============================================

[Global]
# SECURITY: Deny access when token is missing or invalid
# Options: passthrough (allow), deny (block), allow_public (complex rules)
onmissing = deny

# Audience - expected 'aud' claim value in JWT tokens
# MUST match your OIDC provider's audience exactly
audience = https://id.gsi.de/realms/wl

[Issuer GSI]
# The issuer URL from JWT token (must match exactly)
issuer = https://id.gsi.de/realms/wl

# Base path this issuer is allowed to access
# Using / since XRootD exports root (oss.localroot maps / to /data internally)
base_path = /

# Map the 'sub' claim from JWT to Unix usernames using mapfile
map_subject = true

# External mapfile for token-to-user mapping
# Mounted from host at runtime in production
name_mapfile = /etc/xrootd/mapfile

# SECURITY: Empty = DENY access for unmapped tokens
# Set to username (e.g., "xrootd") only if fallback is required
default_user = ""
