[Global]
# What to do when a token is missing or invalid
# Options: passthrough (allow without authz), deny (block), allow_public (complex rules)
onmissing = passthrough
# Audience - the expected 'aud' claim value in JWT tokens
# For GSI Keycloak, tokens have aud = https://id.gsi.de/realms/wl
# Use the exact value from your JWT tokens (check with jwt.io or base64 decode)
# Setting this to ANY is less secure - only use for testing!
audience = https://id.gsi.de/realms/wl

[Issuer GSI]
# The issuer URL from your JWT token (must match exactly)
issuer = https://id.gsi.de/realms/wl
# Base path this issuer is allowed to access
base_path = /data
# Map the 'sub' claim from JWT to Unix usernames using the mapfile
map_subject = true
# Use the mapfile to map token subjects to Unix usernames
name_mapfile = /etc/xrootd/mapfile
# Default user if mapping fails
# SECURITY: Set to empty string ("") to DENY access for unmapped tokens
# Set to a username (e.g., "xrootd") to allow fallback access
default_user = ""
