name: Version Tag Processor

on:
  push:
    tags:
      - "release-v[0-9]+.[0-9]+.[0-9]+" # Trigger release preparation
      - "hotfix-v[0-9]+.[0-9]+.[0-9]+" # Trigger hotfix release preparation
      - "prerelease-v[0-9]+.[0-9]+.[0-9]+-*" # Trigger pre-release preparation

# Prevent concurrent workflow runs to avoid versioning conflicts
concurrency:
  group: version-processor-${{ github.ref }}
  cancel-in-progress: false # Don't cancel in-progress runs to avoid inconsistent states

env:
  NODE_VERSION: "23"

jobs:
  # Job to extract tag info and determine target release version
  determine-versions:
    name: Determine Release Versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      trigger_tag: ${{ steps.versions.outputs.trigger_tag }}
      trigger_type: ${{ steps.versions.outputs.trigger_type }}
      target_tag: ${{ steps.versions.outputs.target_tag }}
      target_version: ${{ steps.versions.outputs.target_version }}
      frontend_version: ${{ steps.versions.outputs.frontend_version }}
      backend_version: ${{ steps.versions.outputs.backend_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for versioning

      - name: Extract version info from trigger tag
        id: versions
        run: |
          # Get the pushed tag (remove refs/tags/ prefix)
          TRIGGER_TAG=${GITHUB_REF#refs/tags/}

          # Determine trigger type and extract target version
          if [[ $TRIGGER_TAG =~ ^release-v(.+)$ ]]; then
            TRIGGER_TYPE="release"
            TARGET_VERSION="${BASH_REMATCH[1]}"
          elif [[ $TRIGGER_TAG =~ ^hotfix-v(.+)$ ]]; then
            TRIGGER_TYPE="hotfix"
            TARGET_VERSION="${BASH_REMATCH[1]}"
          elif [[ $TRIGGER_TAG =~ ^prerelease-v(.+)$ ]]; then
            TRIGGER_TYPE="prerelease"
            TARGET_VERSION="${BASH_REMATCH[1]}"
          else
            echo "::error::Unknown trigger tag format: $TRIGGER_TAG"
            exit 1
          fi

          TARGET_TAG="v${TARGET_VERSION}"

          # Generate versions for frontend and backend based on target version
          FRONTEND_VERSION=$TARGET_VERSION
          BACKEND_VERSION=$TARGET_VERSION

          # Set output for next steps
          echo "trigger_tag=$TRIGGER_TAG" >> $GITHUB_OUTPUT
          echo "trigger_type=$TRIGGER_TYPE" >> $GITHUB_OUTPUT
          echo "target_tag=$TARGET_TAG" >> $GITHUB_OUTPUT
          echo "target_version=$TARGET_VERSION" >> $GITHUB_OUTPUT
          echo "frontend_version=$FRONTEND_VERSION" >> $GITHUB_OUTPUT
          echo "backend_version=$BACKEND_VERSION" >> $GITHUB_OUTPUT

          echo "Release preparation triggered:"
          echo "- Trigger: $TRIGGER_TAG ($TRIGGER_TYPE)"
          echo "- Target: $TARGET_TAG"
          echo "- Frontend: web/v$FRONTEND_VERSION"
          echo "- Backend: app/v$BACKEND_VERSION"

          # Store version info for next workflow
          mkdir -p /tmp/version-info
          echo "$TARGET_TAG" > /tmp/version-info/global_tag.txt
          echo "$TARGET_VERSION" > /tmp/version-info/global_version.txt
          echo "$FRONTEND_VERSION" > /tmp/version-info/frontend_version.txt
          echo "$BACKEND_VERSION" > /tmp/version-info/backend_version.txt

      - name: Upload version info
        uses: actions/upload-artifact@v7
        with:
          name: version-info
          path: /tmp/version-info
          retention-days: 1

  # NOTE: Component tag creation was moved to the publish-release workflow
  # WHY: When creating tags from within a workflow triggered by a tag push,
  # GitHub enforces stricter permission restrictions to prevent potential
  # infinite workflow loops. Moving this logic to the publish-release workflow,
  # which is triggered by a workflow_run event rather than a tag push, avoids
  # these permission issues while still maintaining the same functionality.

  # Job to prepare package version updates (but not commit them)
  prepare-package-versions:
    name: Prepare Package Version Updates
    needs: determine-versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master # Explicitly checkout the master branch

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync versions in files
        run: npm run sync-versions
        env:
          GLOBAL_VERSION: ${{ needs.determine-versions.outputs.target_version }}
          FRONTEND_VERSION: ${{ needs.determine-versions.outputs.frontend_version }}
          BACKEND_VERSION: ${{ needs.determine-versions.outputs.backend_version }}

      # Save the changes for later commit
      - name: Upload updated package files
        uses: actions/upload-artifact@v7
        with:
          name: updated-package-files
          path: |
            package.json
            web/package.json
            package-lock.json
          retention-days: 1

  # Job to prepare changelog update (but not commit it)
  prepare-changelog:
    name: Prepare CHANGELOG Update
    needs: determine-versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master # Explicitly checkout the master branch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Update CHANGELOG.md
        run: |
          # Get the previous version tag for changelog generation
          PREV_TAG=$(git describe --tags --abbrev=0 --match "v*" HEAD~1 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            # Generate a changelog for the new version tag using explicit tag range
            python tools/changelog.py update \
              --version ${{ needs.determine-versions.outputs.target_version }} \
              --from-tag $PREV_TAG \
              --to-tag HEAD
          else
            # No previous tag found, generate from beginning
            python tools/changelog.py update \
              --version ${{ needs.determine-versions.outputs.target_version }} \
              --to-tag HEAD
          fi

          echo "CHANGELOG.md updated successfully for ${{ needs.determine-versions.outputs.target_tag }}"

      # Save the changes for later commit
      - name: Upload updated changelog
        uses: actions/upload-artifact@v7
        with:
          name: updated-changelog
          path: CHANGELOG.md
          retention-days: 1

  # Job to generate release notes content
  generate-release-notes:
    name: Generate Release Notes Content
    needs: [determine-versions, prepare-changelog]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate release notes
        id: changelog
        run: |
          mkdir -p /tmp/changelog

          # Get the previous version tag for release notes generation
          PREV_TAG=$(git describe --tags --abbrev=0 --match "v*" HEAD~1 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            # Generate release notes using explicit tag range
            python3 tools/generate_release_notes.py \
              --version ${{ needs.determine-versions.outputs.target_version }} \
              --from-tag $PREV_TAG \
              --to-tag HEAD > /tmp/changelog/changelog_content.md
          else
            # No previous tag found, generate from beginning
            python3 tools/generate_release_notes.py \
              --version ${{ needs.determine-versions.outputs.target_version }} \
              --to-tag HEAD > /tmp/changelog/changelog_content.md
          fi

          echo "Release notes generated successfully."

      - name: Upload release notes content
        uses: actions/upload-artifact@v7
        with:
          name: version-changelog
          path: /tmp/changelog
          retention-days: 5

  # Job to prepare release notes file update (but not commit it)
  prepare-release-notes:
    name: Prepare Release Notes File
    needs: [determine-versions, generate-release-notes]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master # Explicitly checkout the master branch

      - name: Download changelog content
        uses: actions/download-artifact@v8
        with:
          name: version-changelog
          path: /tmp/changelog

      - name: Update RELEASE_NOTES.md
        run: |
          # Read the changelog content
          CHANGELOG_CONTENT=$(cat /tmp/changelog/changelog_content.md)

          # Create a new file with only the latest version's content
          # This follows the best practice of keeping only the latest release in RELEASE_NOTES.md
          echo "# Release Notes" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## ${{ needs.determine-versions.outputs.target_tag }} ($(date '+%Y-%m-%d'))" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Changelog:" >> RELEASE_NOTES.md
          echo "$CHANGELOG_CONTENT" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md

          echo "Updated RELEASE_NOTES.md successfully with only the latest version."

      # Save the changes for later commit
      - name: Upload updated release notes
        uses: actions/upload-artifact@v7
        with:
          name: updated-release-notes
          path: RELEASE_NOTES.md
          retention-days: 1

  # Job to consolidate all changes, commit them, and create the actual release tag
  commit-all-changes:
    name: Commit All Changes and Create Release Tag
    needs:
      [
        determine-versions,
        prepare-package-versions,
        prepare-changelog,
        prepare-release-notes,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # For committing changes and creating tags
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master # Explicitly checkout the master branch

      # Download all the prepared changes
      - name: Download package file changes
        uses: actions/download-artifact@v8
        with:
          name: updated-package-files
          path: .

      - name: Download changelog changes
        uses: actions/download-artifact@v8
        with:
          name: updated-changelog
          path: .

      - name: Download release notes changes
        uses: actions/download-artifact@v8
        with:
          name: updated-release-notes
          path: .

      - name: Commit changes and create release tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

          # Fetch from remote to ensure we have the latest changes
          git fetch origin master

          # Stage the changed files
          git add package.json web/package.json package-lock.json CHANGELOG.md RELEASE_NOTES.md

          # Check if there are any changes to commit
          if git diff-index --quiet HEAD --; then
            echo "No files changed, this might indicate an issue with artifact download"
            echo "Listing current directory contents:"
            ls -la
            echo "Checking git status:"
            git status
            exit 1
          else
            # Create a single commit with all changes
            git commit -m "chore: Prepare release ${{ needs.determine-versions.outputs.target_tag }} [skip ci]"

            # Create the actual release tag on this commit
            git tag ${{ needs.determine-versions.outputs.target_tag }}

            # Create component tags for frontend and backend
            git tag web/v${{ needs.determine-versions.outputs.frontend_version }}
            git tag app/v${{ needs.determine-versions.outputs.backend_version }}

            # Push both the commit and all new tags
            git push origin HEAD:master
            git push origin ${{ needs.determine-versions.outputs.target_tag }}
            git push origin web/v${{ needs.determine-versions.outputs.frontend_version }}
            git push origin app/v${{ needs.determine-versions.outputs.backend_version }}

            echo "Successfully created release preparation commit and tags:"
            echo "- Commit: Prepare release ${{ needs.determine-versions.outputs.target_tag }}"
            echo "- Release tag: ${{ needs.determine-versions.outputs.target_tag }}"
            echo "- Component tags: web/v${{ needs.determine-versions.outputs.frontend_version }}, app/v${{ needs.determine-versions.outputs.backend_version }}"
          fi
