name: Version Tag Processor

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # Trigger only on global version tags (vX.Y.Z)

# Prevent concurrent workflow runs to avoid versioning conflicts
concurrency:
  group: version-processor-${{ github.ref }}
  cancel-in-progress: false # Don't cancel in-progress runs to avoid inconsistent states

env:
  NODE_VERSION: "23"

jobs:
  # Job to extract tag info
  determine-versions:
    name: Determine Versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      global_tag: ${{ steps.versions.outputs.global_tag }}
      global_version: ${{ steps.versions.outputs.global_version }}
      frontend_version: ${{ steps.versions.outputs.frontend_version }}
      backend_version: ${{ steps.versions.outputs.backend_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for versioning

      - name: Extract version info
        id: versions
        run: |
          # Get the pushed tag (remove refs/tags/ prefix)
          GLOBAL_TAG=${GITHUB_REF#refs/tags/}
          GLOBAL_VERSION=${GLOBAL_TAG#v}

          # Generate versions for frontend and backend based on global version
          FRONTEND_VERSION=$GLOBAL_VERSION
          BACKEND_VERSION=$GLOBAL_VERSION

          # Set output for next steps
          echo "global_tag=$GLOBAL_TAG" >> $GITHUB_OUTPUT
          echo "global_version=$GLOBAL_VERSION" >> $GITHUB_OUTPUT
          echo "frontend_version=$FRONTEND_VERSION" >> $GITHUB_OUTPUT
          echo "backend_version=$BACKEND_VERSION" >> $GITHUB_OUTPUT

          echo "Version information:"
          echo "- Global: $GLOBAL_TAG"
          echo "- Frontend: web/v$FRONTEND_VERSION"
          echo "- Backend: app/v$BACKEND_VERSION"

          # Store version info for next workflow
          mkdir -p /tmp/version-info
          echo "$GLOBAL_TAG" > /tmp/version-info/global_tag.txt
          echo "$GLOBAL_VERSION" > /tmp/version-info/global_version.txt
          echo "$FRONTEND_VERSION" > /tmp/version-info/frontend_version.txt
          echo "$BACKEND_VERSION" > /tmp/version-info/backend_version.txt

      - name: Upload version info
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: /tmp/version-info
          retention-days: 1

  # NOTE: Component tag creation was moved to the publish-release workflow
  # WHY: When creating tags from within a workflow triggered by a tag push,
  # GitHub enforces stricter permission restrictions to prevent potential
  # infinite workflow loops. Moving this logic to the publish-release workflow,
  # which is triggered by a workflow_run event rather than a tag push, avoids
  # these permission issues while still maintaining the same functionality.

  # Job to prepare package version updates (but not commit them)
  prepare-package-versions:
    name: Prepare Package Version Updates
    needs: determine-versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master # Explicitly checkout the master branch

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync versions in files
        run: npm run sync-versions
        env:
          GLOBAL_VERSION: ${{ needs.determine-versions.outputs.global_version }}
          FRONTEND_VERSION: ${{ needs.determine-versions.outputs.frontend_version }}
          BACKEND_VERSION: ${{ needs.determine-versions.outputs.backend_version }}

      # Save the changes for later commit
      - name: Upload updated package files
        uses: actions/upload-artifact@v4
        with:
          name: updated-package-files
          path: |
            package.json
            web/package.json
          retention-days: 1

  # Job to prepare changelog update (but not commit it)
  prepare-changelog:
    name: Prepare CHANGELOG Update
    needs: determine-versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master # Explicitly checkout the master branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update CHANGELOG.md
        run: |
          # Generate a changelog for the new version tag
          python tools/changelog.py update --version ${{ needs.determine-versions.outputs.global_version }} --to-tag ${{ needs.determine-versions.outputs.global_tag }}

          echo "CHANGELOG.md updated successfully for ${{ needs.determine-versions.outputs.global_tag }}"

      # Save the changes for later commit
      - name: Upload updated changelog
        uses: actions/upload-artifact@v4
        with:
          name: updated-changelog
          path: CHANGELOG.md
          retention-days: 1

  # Job to generate release notes content
  generate-release-notes:
    name: Generate Release Notes Content
    needs: [determine-versions, prepare-changelog]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate release notes
        id: changelog
        run: |
          mkdir -p /tmp/changelog

          # Generate release notes using the Python script
          python3 tools/generate_release_notes.py --version ${{ needs.determine-versions.outputs.global_version }} > /tmp/changelog/changelog_content.md

          echo "Release notes generated successfully."

      - name: Upload release notes content
        uses: actions/upload-artifact@v4
        with:
          name: version-changelog
          path: /tmp/changelog
          retention-days: 5

  # Job to prepare release notes file update (but not commit it)
  prepare-release-notes:
    name: Prepare Release Notes File
    needs: [determine-versions, generate-release-notes]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master # Explicitly checkout the master branch

      - name: Download changelog content
        uses: actions/download-artifact@v4
        with:
          name: version-changelog
          path: /tmp/changelog

      - name: Update RELEASE_NOTES.md
        run: |
          # Read the changelog content
          CHANGELOG_CONTENT=$(cat /tmp/changelog/changelog_content.md)

          # Create a new file with only the latest version's content
          # This follows the best practice of keeping only the latest release in RELEASE_NOTES.md
          echo "# Release Notes" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## ${{ needs.determine-versions.outputs.global_tag }} ($(date '+%Y-%m-%d'))" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Changelog:" >> RELEASE_NOTES.md
          echo "$CHANGELOG_CONTENT" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "*This release was automatically generated by GitHub Actions.*" >> RELEASE_NOTES.md

          echo "Updated RELEASE_NOTES.md successfully with only the latest version."

      # Save the changes for later commit
      - name: Upload updated release notes
        uses: actions/upload-artifact@v4
        with:
          name: updated-release-notes
          path: RELEASE_NOTES.md
          retention-days: 1

  # Job to consolidate all changes and commit them at once
  commit-all-changes:
    name: Commit All Version-Related Changes
    needs:
      [
        determine-versions,
        prepare-package-versions,
        prepare-changelog,
        prepare-release-notes,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # For committing changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master # Explicitly checkout the master branch

      # Download all the prepared changes
      - name: Download package file changes
        uses: actions/download-artifact@v4
        with:
          name: updated-package-files
          path: .

      - name: Download changelog changes
        uses: actions/download-artifact@v4
        with:
          name: updated-changelog
          path: .

      - name: Download release notes changes
        uses: actions/download-artifact@v4
        with:
          name: updated-release-notes
          path: .

      - name: Commit and push all changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

          # Fetch from remote to ensure we have the latest changes
          git fetch origin master

          # Reset to match remote branch if necessary to avoid conflicts
          git reset --hard origin/master

          # Apply the changes from artifacts (they overwrite the files)
          # No need for git add as the files are already overwritten

          # Stage the changed files
          git add package.json web/package.json CHANGELOG.md RELEASE_NOTES.md

          # Check if there are any changes to commit
          if git diff-index --quiet HEAD --; then
            echo "No files changed, skipping commit"
          else
            # Create a single commit with all changes
            git commit -m "chore: Version ${{ needs.determine-versions.outputs.global_tag }} documentation and package updates [skip ci]"
            git push origin HEAD:master  # Explicitly push to master branch
          fi
