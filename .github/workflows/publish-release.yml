name: Publish Release

on:
  workflow_run:
    workflows: ["Auto Version Bump and Release"]
    types:
      - completed
    branches: ["master"]

# Prevent concurrent deployments
concurrency:
  group: publish-release-${{ github.event.workflow_run.id }}
  cancel-in-progress: false  # Don't cancel in-progress releases

env:
  NODE_VERSION: '23'
  GO_VERSION_FILE: "./app/go.mod"
  RPM_OUTPUT_DIR_X86: "/home/runner/rpmbuild/RPMS/x86_64"
  RPM_OUTPUT_DIR_NOARCH: "/home/runner/rpmbuild/RPMS/noarch"
  ARTIFACT_RETENTION_DAYS: 30

jobs:
  # Job to extract tag info and setup
  prepare-release:
    name: Prepare Release Environment
    # Only run if the auto-version workflow was successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      global_tag: ${{ steps.latest_tag.outputs.global_tag }}
      version: ${{ steps.latest_tag.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history and tags
      
      - name: Get latest tag
        id: latest_tag
        run: |
          # Get the latest version tags
          GLOBAL_TAG=$(git describe --tags --match "v*" --abbrev=0)
          
          # Set as output
          echo "global_tag=$GLOBAL_TAG" >> $GITHUB_OUTPUT
          echo "version=${GLOBAL_TAG#v}" >> $GITHUB_OUTPUT
          
          echo "Latest tag is: $GLOBAL_TAG"
  
  # Job to build the frontend
  build-frontend:
    name: Build Frontend
    needs: prepare-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build frontend
        id: build_frontend
        run: npm run build:frontend
        timeout-minutes: 10
      
      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web/dist
          retention-days: 1  # Short retention since it's just for the workflow
  
  # Job to build the backend
  build-backend:
    name: Build Backend
    needs: prepare-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: "./app/go.sum"
      
      - name: Build backend
        id: build_backend
        run: cd app && go build -o data-lake-ui-backend
        timeout-minutes: 10
      
      - name: Upload backend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: app/data-lake-ui-backend
          retention-days: 1  # Short retention since it's just for the workflow
  
  # Job to build RPM packages
  build-rpms:
    name: Build RPM Packages
    needs: [prepare-release, build-frontend, build-backend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install RPM build dependencies
        run: sudo apt-get update && sudo apt-get install -y rpm python3
      
      - name: Build RPM packages
        id: build_rpm
        run: python3 packaging/build_rpm.py -b -f -v ${{ needs.prepare-release.outputs.version }}
        timeout-minutes: 15
      
      - name: Upload RPMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: |
            ${{ env.RPM_OUTPUT_DIR_X86 }}/*.rpm
            ${{ env.RPM_OUTPUT_DIR_NOARCH }}/*.rpm
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error
      
      - name: Extract RPM names
        id: rpm_names
        run: |
          mkdir -p /tmp/rpm-info
          FRONTEND_RPM=$(find ${{ env.RPM_OUTPUT_DIR_NOARCH }} -name "data-lake-ui-frontend-*.rpm" -printf "%f\n" | head -n 1 || echo "")
          BACKEND_RPM=$(find ${{ env.RPM_OUTPUT_DIR_X86 }} -name "data-lake-ui-backend-*.rpm" -printf "%f\n" | head -n 1 || echo "")
          
          if [ -z "$FRONTEND_RPM" ]; then
            echo "::warning::Frontend RPM not found in noarch directory"
            FRONTEND_RPM="not-found"
          fi
          
          if [ -z "$BACKEND_RPM" ]; then
            echo "::warning::Backend RPM not found in x86_64 directory"
            BACKEND_RPM="not-found"
          fi
          
          echo "$FRONTEND_RPM" > /tmp/rpm-info/frontend_rpm
          echo "$BACKEND_RPM" > /tmp/rpm-info/backend_rpm
          
          echo "Found RPMs:"
          [ "$FRONTEND_RPM" != "not-found" ] && echo "- Frontend: $FRONTEND_RPM"
          [ "$BACKEND_RPM" != "not-found" ] && echo "- Backend: $BACKEND_RPM"
      
      - name: Upload RPM info
        uses: actions/upload-artifact@v4
        with:
          name: rpm-info
          path: /tmp/rpm-info/
          retention-days: 1
  
  # Final job to publish the release
  publish-release:
    name: Publish GitHub Release
    needs: [prepare-release, build-rpms]
    # Do not run if previous jobs failed
    if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download RPM packages
        uses: actions/download-artifact@v4
        with:
          name: rpm-packages
          path: /tmp/rpms
      
      - name: Download RPM info
        uses: actions/download-artifact@v4
        with:
          name: rpm-info
          path: /tmp/rpm-info
      
      - name: Read RPM info
        id: rpm_info
        run: |
          FRONTEND_RPM=$(cat /tmp/rpm-info/frontend_rpm)
          BACKEND_RPM=$(cat /tmp/rpm-info/backend_rpm)
          
          echo "frontend_rpm=$FRONTEND_RPM" >> $GITHUB_OUTPUT
          echo "backend_rpm=$BACKEND_RPM" >> $GITHUB_OUTPUT
          
          echo "RPM Info:"
          echo "- Frontend: $FRONTEND_RPM"
          echo "- Backend: $BACKEND_RPM"
      
      - name: Add RPMs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.global_tag }}
          files: /tmp/rpms/**/*.rpm
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update release notes with RPM information
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseTag = "${{ needs.prepare-release.outputs.global_tag }}";
            const frontendRpm = "${{ steps.rpm_info.outputs.frontend_rpm }}";
            const backendRpm = "${{ steps.rpm_info.outputs.backend_rpm }}";
            
            // Get the existing release
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const release = releases.data.find(r => r.tag_name === releaseTag);
            
            if (release) {
              // Prepare RPM information
              let rpmInfo = `
              ## RPM Packages
              
              The following RPM packages are available for installation:
              `;
              
              if (frontendRpm && frontendRpm !== "not-found") {
                rpmInfo += `\n- **Frontend**: \`${frontendRpm}\``;
              }
              
              if (backendRpm && backendRpm !== "not-found") {
                rpmInfo += `\n- **Backend**: \`${backendRpm}\``;
              }
              
              rpmInfo += `\n\n*RPM packages are attached to this release.*`;
              
              // Update the release with RPM information
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                body: release.body + "\n" + rpmInfo
              });
              
              console.log("Successfully updated release notes with RPM information");
            } else {
              console.error(`Release with tag ${releaseTag} not found`);
              process.exit(1);
            }