name: Build and Publish Release

on:
  workflow_run:
    workflows: ["Version Tag Processor"]
    types:
      - completed
    # Remove branch restriction since our Version Tag Processor is triggered by tags, not branches

# Prevent concurrent deployments
concurrency:
  group: publish-release-${{ github.event.workflow_run.id }}
  cancel-in-progress: false # Don't cancel in-progress releases

env:
  NODE_VERSION: "23"
  GO_VERSION_FILE: "./app/go.mod"
  ARTIFACT_RETENTION_DAYS: 30

jobs:
  # Job to extract tag info and setup
  prepare-release:
    name: Prepare Release Environment
    # Only run if the version tag processor workflow was successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      global_tag: ${{ steps.get_versions.outputs.global_tag }}
      version: ${{ steps.get_versions.outputs.version }}
      frontend_version: ${{ steps.get_versions.outputs.frontend_version }}
      backend_version: ${{ steps.get_versions.outputs.backend_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history and tags

      - name: Download version info from previous workflow
        uses: dawidd6/action-download-artifact@v19
        with:
          workflow: version-tag-processor.yml
          name: version-info
          path: /tmp/version-info

      - name: Get version information
        id: get_versions
        run: |
          # Read version information from files
          GLOBAL_TAG=$(cat /tmp/version-info/global_tag.txt)
          GLOBAL_VERSION=$(cat /tmp/version-info/global_version.txt)
          FRONTEND_VERSION=$(cat /tmp/version-info/frontend_version.txt)
          BACKEND_VERSION=$(cat /tmp/version-info/backend_version.txt)

          # Set outputs for next steps
          echo "global_tag=$GLOBAL_TAG" >> $GITHUB_OUTPUT
          echo "version=$GLOBAL_VERSION" >> $GITHUB_OUTPUT
          echo "frontend_version=$FRONTEND_VERSION" >> $GITHUB_OUTPUT
          echo "backend_version=$BACKEND_VERSION" >> $GITHUB_OUTPUT

          echo "Version information:"
          echo "- Global: $GLOBAL_TAG"
          echo "- Frontend: web/v$FRONTEND_VERSION"
          echo "- Backend: app/v$BACKEND_VERSION"

      - name: Upload version info for subsequent workflows
        uses: actions/upload-artifact@v7
        with:
          name: version-info
          path: /tmp/version-info
          retention-days: 1

      - name: Download changelog from version-tag-processor workflow
        uses: dawidd6/action-download-artifact@v19
        with:
          workflow: version-tag-processor.yml
          name: version-changelog
          path: /tmp/changelog

      - name: Upload changelog for this workflow
        uses: actions/upload-artifact@v7
        with:
          name: version-changelog
          path: /tmp/changelog
          retention-days: 1

  # Job to build the frontend
  build-frontend:
    name: Build Frontend
    needs: [prepare-release]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master # Must use master to get the version-bumped package.json and v* tags from version-tag-processor

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        id: build_frontend
        run: npm run build:frontend
        timeout-minutes: 10

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: web/dist
          retention-days: 1 # Short retention since it's just for the workflow

  # Job to build the backend
  build-backend:
    name: Build Backend
    needs: [prepare-release]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master # Must use master to get the version-bumped go files and app/v* tags from version-tag-processor

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: "./app/go.sum"

      - name: Build backend
        id: build_backend
        run: cd app && go build -o dataharbor-backend
        timeout-minutes: 10

      - name: Upload backend build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backend-build
          path: app/dataharbor-backend
          retention-days: 1 # Short retention since it's just for the workflow

  # Use the reusable workflow to build RPM packages
  build-rpms:
    name: Build RPM Packages
    needs: [prepare-release, build-frontend, build-backend]
    uses: ./.github/workflows/build-rpm.yml
    with:
      component: "both"
      version: ${{ needs.prepare-release.outputs.version }}
      is_pr_build: false # Release builds are never PR builds

  # Final job to publish the release
  publish-release:
    name: Publish GitHub Release
    needs: [prepare-release, build-rpms]
    # Do not run if previous jobs failed
    if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download RPM packages
        uses: actions/download-artifact@v8
        with:
          name: rpm-packages-both-amd64
          path: /tmp/rpms

      - name: Check RPM packages
        run: |
          echo "Found RPMs:"
          find /tmp/rpms -name "*.rpm" -type f | sort

      - name: Download changelog
        uses: actions/download-artifact@v8
        with:
          name: version-changelog
          path: /tmp/changelog

      - name: Extract RPM names
        id: rpm_names
        run: |
          mkdir -p /tmp/rpm-info

          # Find RPMs and handle errors gracefully
          FRONTEND_RPM=$(find /tmp/rpms -name "dataharbor-frontend-*.rpm" -printf "%f\n" 2>/dev/null | head -n 1 || echo "")
          BACKEND_RPM=$(find /tmp/rpms -name "dataharbor-backend-*.rpm" -printf "%f\n" 2>/dev/null | head -n 1 || echo "")

          if [ -z "$FRONTEND_RPM" ]; then
            echo "::warning::Frontend RPM not found"
            FRONTEND_RPM="not-found"
          fi

          if [ -z "$BACKEND_RPM" ]; then
            echo "::warning::Backend RPM not found"
            BACKEND_RPM="not-found"
          fi

          echo "frontend_rpm=$FRONTEND_RPM" >> $GITHUB_OUTPUT
          echo "backend_rpm=$BACKEND_RPM" >> $GITHUB_OUTPUT

          echo "Found RPMs:"
          [ "$FRONTEND_RPM" != "not-found" ] && echo "- Frontend: $FRONTEND_RPM"
          [ "$BACKEND_RPM" != "not-found" ] && echo "- Backend: $BACKEND_RPM"

      - name: Checkout repository for deploy bundle
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            docker/docker-compose.deploy.yml
            docker/.env.production.example
          sparse-checkout-cone-mode: false

      - name: Create deployment bundle
        id: deploy_bundle
        run: |
          VERSION=${{ needs.prepare-release.outputs.version }}
          BUNDLE_DIR="/tmp/dataharbor-deploy-${VERSION}"
          mkdir -p "${BUNDLE_DIR}"

          cp docker/docker-compose.deploy.yml "${BUNDLE_DIR}/docker-compose.yml"
          cp docker/.env.production.example "${BUNDLE_DIR}/.env.example"

          # Create a README for the deployment bundle
          cat > "${BUNDLE_DIR}/README.md" << 'DEPLOY_README'
          # DataHarbor Deployment Bundle

          ## Quick Start

          1. Copy `.env.example` to `.env` and configure for your environment
          2. Deploy:

          ```bash
          VERSION=<version> docker compose up -d
          ```

          All configuration is done via environment variables in the `.env` file.
          Config files (backend, xrootd, scitokens) are baked into the Docker images.

          See the project documentation for full deployment instructions.
          DEPLOY_README

          BUNDLE_FILE="/tmp/dataharbor-deploy-${VERSION}.tar.gz"
          tar -czf "${BUNDLE_FILE}" -C /tmp "dataharbor-deploy-${VERSION}"

          echo "bundle_file=${BUNDLE_FILE}" >> $GITHUB_OUTPUT
          echo "Created deployment bundle: ${BUNDLE_FILE}"

      - name: Read changelog
        id: changelog
        run: |
          CHANGELOG=$(cat /tmp/changelog/changelog_content.md)

          # For GitHub Actions output, need to use a different delimiter format
          delimiter="CHANGELOG_EOF"
          echo "content<<$delimiter" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$delimiter" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.global_tag }}
          name: Release ${{ needs.prepare-release.outputs.global_tag }}
          body: |
            # Release ${{ needs.prepare-release.outputs.global_tag }}

            ## Version Information
            - Global: ${{ needs.prepare-release.outputs.global_tag }}
            - Frontend: web/v${{ needs.prepare-release.outputs.frontend_version }}
            - Backend: app/v${{ needs.prepare-release.outputs.backend_version }}

            ## What's Changed
            ${{ steps.changelog.outputs.content }}

            ## Docker Compose Deployment

            A deployment bundle is attached (`dataharbor-deploy-${{ needs.prepare-release.outputs.version }}.tar.gz`) containing:
            - `docker-compose.yml` — Compose file for deploying pre-built images from GHCR
            - `.env.example` — Environment variables template

            All configuration (backend, XRootD, SciTokens) is baked into the Docker images
            and controlled via environment variables in the `.env` file.

            ```bash
            tar xzf dataharbor-deploy-${{ needs.prepare-release.outputs.version }}.tar.gz
            cd dataharbor-deploy-${{ needs.prepare-release.outputs.version }}
            cp .env.example .env
            # Edit .env with your configuration
            VERSION=${{ needs.prepare-release.outputs.version }} docker compose up -d
            ```

            ## RPM Packages

            The following RPM packages are available for installation:
            ${{ steps.rpm_names.outputs.frontend_rpm != 'not-found' && format('- **Frontend**: `{0}`', steps.rpm_names.outputs.frontend_rpm) || '' }}
            ${{ steps.rpm_names.outputs.backend_rpm != 'not-found' && format('- **Backend**: `{0}`', steps.rpm_names.outputs.backend_rpm) || '' }}

            *Release artifacts are attached below.*

            *This release was automatically created by GitHub Actions.*
          files: |
            /tmp/rpms/*.rpm
            ${{ steps.deploy_bundle.outputs.bundle_file }}
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}
