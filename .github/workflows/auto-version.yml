name: Auto Version Bump

on:
  push:
    branches: ["master"]  # Keep master as the main branch

# Prevent concurrent workflow runs to avoid versioning conflicts
concurrency:
  group: auto-version-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel in-progress runs to avoid inconsistent states

env:
  NODE_VERSION: '23'

jobs:
  # Job to extract and calculate new versions
  determine-versions:
    name: Determine New Versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      global_current_tag: ${{ steps.versions.outputs.global_current_tag }}
      frontend_current_tag: ${{ steps.versions.outputs.frontend_current_tag }}
      backend_current_tag: ${{ steps.versions.outputs.backend_current_tag }}
      global_new_version: ${{ steps.versions.outputs.global_new_version }}
      frontend_new_version: ${{ steps.versions.outputs.frontend_new_version }}
      backend_new_version: ${{ steps.versions.outputs.backend_new_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for versioning
          
      - name: Extract current version info
        id: versions
        run: |
          # Get the latest version tags
          GLOBAL_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.1.0")
          FRONTEND_TAG=$(git describe --tags --match "web/v*" --abbrev=0 2>/dev/null || echo "web/v0.1.0")
          BACKEND_TAG=$(git describe --tags --match "app/v*" --abbrev=0 2>/dev/null || echo "app/v0.1.0")
          
          # Extract version numbers without prefix
          GLOBAL_VERSION=${GLOBAL_TAG#v}
          FRONTEND_VERSION=${FRONTEND_TAG#web/v}
          BACKEND_VERSION=${BACKEND_TAG#app/v}
          
          # Parse and increment the minor version (X.Y+1.Z)
          function increment_minor() {
            local version=$1
            local major=$(echo $version | cut -d. -f1)
            local minor=$(echo $version | cut -d. -f2)
            local patch=$(echo $version | cut -d. -f3)
            local new_minor=$((minor + 1))
            echo "$major.$new_minor.0"
          }
          
          NEW_GLOBAL_VERSION=$(increment_minor $GLOBAL_VERSION)
          NEW_FRONTEND_VERSION=$(increment_minor $FRONTEND_VERSION)
          NEW_BACKEND_VERSION=$(increment_minor $BACKEND_VERSION)
          
          # Set output for next steps
          echo "global_current_tag=$GLOBAL_TAG" >> $GITHUB_OUTPUT
          echo "frontend_current_tag=$FRONTEND_TAG" >> $GITHUB_OUTPUT
          echo "backend_current_tag=$BACKEND_TAG" >> $GITHUB_OUTPUT
          
          echo "global_new_version=$NEW_GLOBAL_VERSION" >> $GITHUB_OUTPUT
          echo "frontend_new_version=$NEW_FRONTEND_VERSION" >> $GITHUB_OUTPUT
          echo "backend_new_version=$NEW_BACKEND_VERSION" >> $GITHUB_OUTPUT
          
          echo "Current versions:"
          echo "- Global: $GLOBAL_TAG -> v$NEW_GLOBAL_VERSION"
          echo "- Frontend: $FRONTEND_TAG -> web/v$NEW_FRONTEND_VERSION"
          echo "- Backend: $BACKEND_TAG -> app/v$NEW_BACKEND_VERSION"
  
  # Job to create and push tags
  create-tags:
    name: Create and Push Tags
    needs: determine-versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write  # For tag creation and pushing
    outputs:
      tags_created: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Create and push tags
        id: create_tags
        run: |
          # Create new tags
          git tag v${{ needs.determine-versions.outputs.global_new_version }}
          git tag web/v${{ needs.determine-versions.outputs.frontend_new_version }}
          git tag app/v${{ needs.determine-versions.outputs.backend_new_version }}
          
          # Push the new tags
          git push origin v${{ needs.determine-versions.outputs.global_new_version }}
          git push origin web/v${{ needs.determine-versions.outputs.frontend_new_version }}
          git push origin app/v${{ needs.determine-versions.outputs.backend_new_version }}
          
          echo "Created and pushed new tags:"
          echo "- v${{ needs.determine-versions.outputs.global_new_version }}"
          echo "- web/v${{ needs.determine-versions.outputs.frontend_new_version }}"
          echo "- app/v${{ needs.determine-versions.outputs.backend_new_version }}"
  
  # Job to synchronize version info across projects
  sync-versions:
    name: Synchronize Version Files
    needs: [determine-versions, create-tags]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # For committing changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Sync versions with package.json
        id: sync_versions
        run: npm run sync-versions
      
      - name: Run prepare-release
        id: prepare_release
        run: npm run prepare-release
        timeout-minutes: 10
        
      - name: Commit package.json updates
        run: |
          # Check if there are changes to commit
          if [[ -n "$(git status --porcelain)" ]]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add package.json web/package.json
            git commit -m "chore: Update version to v${{ needs.determine-versions.outputs.global_new_version }} in package.json files"
            git push
          else
            echo "No package.json changes to commit"
          fi
  
  # Job to generate changelog and release notes
  generate-changelog:
    name: Generate Changelog
    needs: [determine-versions, create-tags]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      changelog_content: ${{ steps.changelog.outputs.content }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate changelog
        id: changelog
        run: |
          # Make the changelog script executable
          chmod +x tools/generate-changelog.js
          
          # Generate changelog between the previous and new global tags
          CHANGELOG=$(node tools/generate-changelog.js v${{ needs.determine-versions.outputs.global_new_version }} ${{ needs.determine-versions.outputs.global_current_tag }})
          
          # Extract the actual changelog content using the delimiters
          CHANGELOG_CONTENT=$(echo "$CHANGELOG" | awk '/GENERATED_CHANGELOG<<EOF/{flag=1;next}/EOF/{flag=0}flag')
          
          # Save changelog to a file for the release
          echo "$CHANGELOG_CONTENT" > changelog_content.md
          
          # Save version information for publish workflow
          echo "${{ needs.determine-versions.outputs.global_new_version }}" > version_info.txt
          
          # Set as output (with proper escaping for GitHub Actions)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-changelog
          path: |
            changelog_content.md
            version_info.txt
          retention-days: 7  # Keep for longer since publish workflow needs it
  
  # Job to update release notes
  update-release-notes:
    name: Update Release Notes
    needs: [determine-versions, generate-changelog, sync-versions]  # Added dependency on sync-versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write  # For committing changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: version-changelog
      
      - name: Update RELEASE_NOTES.md files
        run: |
          # Global RELEASE_NOTES.md
          cat > RELEASE_NOTES.md << EOL
          # Release v${{ needs.determine-versions.outputs.global_new_version }}
          
          ## Version Information
          - Global: v${{ needs.determine-versions.outputs.global_new_version }}
          - Frontend: v${{ needs.determine-versions.outputs.frontend_new_version }}
          - Backend: v${{ needs.determine-versions.outputs.backend_new_version }}
          
          ## What's Changed
          $(cat changelog_content.md)
          
          *This release was automatically generated by GitHub Actions.*
          EOL
          
          # Create separate frontend and backend release notes
          cp RELEASE_NOTES.md web/RELEASE_NOTES.md
          cp RELEASE_NOTES.md app/RELEASE_NOTES.md
      
      - name: Commit release notes updates
        run: |
          # Check if there are changes to commit
          if [[ -n "$(git status --porcelain)" ]]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add RELEASE_NOTES.md web/RELEASE_NOTES.md app/RELEASE_NOTES.md
            git commit -m "chore: Update release notes for v${{ needs.determine-versions.outputs.global_new_version }}"
            git push
          else
            echo "No release notes changes to commit"
          fi