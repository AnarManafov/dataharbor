name: Frontend CI

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"] # Only run on master branch pushes for post-merge verification
    paths:
      - "web/**" # Only run when frontend code changes
      - "packaging/**" # Run when packaging changes affect frontend
    tags-ignore:
      - "**" # Skip all tags - tags trigger other workflows (publish-release, docker-publish)

# Prevent concurrent workflow runs on the same branch/PR
concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true # Cancel in-progress runs on new pushes

env:
  NODE_VERSION: "23" # Updated to match local Node.js 23 version
  FRONTEND_DIR: "./web"
  CACHE_NPM_DEPS: npm-cache-${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Prevent hung workflows
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Use latest v4

      - name: Set up Node.js
        uses: actions/setup-node@v4 # Use latest v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        id: build
        run: cd ${{ env.FRONTEND_DIR }} && npm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4 # Use latest v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_DIR }}/dist
          retention-days: 7
          if-no-files-found: error # Fail if no build artifacts are produced

  # Security scan job to check for vulnerabilities
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Use latest v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Use latest v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: cd ${{ env.FRONTEND_DIR }} && npm audit --audit-level=high
        continue-on-error: true # Don't fail the workflow for security issues, just report them

  # Job to build frontend RPM package using the reusable workflow
  build-rpm:
    needs: [build, security-scan] # Only build RPM if other jobs succeed
    uses: ./.github/workflows/build-rpm.yml
    with:
      component: "frontend"
      is_pr_build: ${{ github.event_name == 'pull_request' }}
