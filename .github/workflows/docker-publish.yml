name: Build and Publish Docker Images

# Build Docker images for production deployment
# Only triggered after a successful release (publish-release workflow)
# For local development/testing builds, use: scripts/build-docker.sh

on:
  workflow_run:
    workflows: ["Build and Publish Release"]
    types:
      - completed

# Prevent concurrent builds
concurrency:
  group: docker-publish-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: anarmanafov

jobs:
  # Determine build context
  prepare:
    name: Prepare Build Context
    runs-on: ubuntu-latest
    # Only proceed if the release workflow succeeded
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.context.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download version info from release workflow
        uses: dawidd6/action-download-artifact@v19
        with:
          workflow: publish-release.yml
          name: version-info
          path: /tmp/version-info
        continue-on-error: true

      - name: Determine version
        id: context
        run: |
          if [[ -f /tmp/version-info/global_version.txt ]]; then
            VERSION=$(cat /tmp/version-info/global_version.txt)
          else
            # Fallback: extract from package.json
            VERSION=$(grep -oP '(?<="version": ")[^"]*' package.json)
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Docker images for version: $VERSION"

  # Build and push Docker images
  build-images:
    name: Build ${{ matrix.image }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: dataharbor-backend
            dockerfile: docker/backend/Dockerfile
            context: .
            platforms: linux/amd64,linux/arm64
          - image: dataharbor-frontend
            dockerfile: docker/frontend/Dockerfile
            context: .
            platforms: linux/amd64,linux/arm64
          - image: dataharbor-nginx
            dockerfile: docker/nginx/Dockerfile
            context: .
            platforms: linux/amd64,linux/arm64
            target: prod # Production config baked in
          - image: dataharbor-xrootd
            dockerfile: docker/xrootd/Dockerfile.prod
            context: .
            platforms: linux/amd64 # XRootD packages not available for ARM64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: master # Must use master to get the version-bumped package.json from version-tag-processor

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

      - name: Output image info
        run: |
          echo "## ${{ matrix.image }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** ${{ matrix.platforms }}" >> $GITHUB_STEP_SUMMARY

  # Summary job
  summary:
    name: Build Summary
    needs: [prepare, build-images]
    runs-on: ubuntu-latest
    if: always() && needs.prepare.result == 'success'
    steps:
      - name: Generate summary
        run: |
          echo "# Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Pull Command |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/dataharbor-backend:${{ needs.prepare.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/dataharbor-frontend:${{ needs.prepare.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Nginx | \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/dataharbor-nginx:${{ needs.prepare.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| XRootD | \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/dataharbor-xrootd:${{ needs.prepare.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
