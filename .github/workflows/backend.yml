name: Backend
on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@master
      - name: Set up Go
        uses: actions/setup-go@master
        with:
          go-version-file: "./app/go.mod"
          cache-dependency-path: "./app/go.sum"
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -v ./...
