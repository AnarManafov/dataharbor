name: Backend CI

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"] # Only run on master branch pushes for post-merge verification
    paths:
      - "app/**" # Only run when backend code changes
    tags-ignore:
      - "v[0-9]+.[0-9]+.[0-9]+" # Skip when version tags are pushed as this is handled by publish-release

# Prevent concurrent workflow runs on the same branch/PR
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true # Cancel in-progress runs on new pushes

env:
  GO_VERSION_FILE: "./app/go.mod"
  GO_SUM_FILE: "./app/go.sum"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Prevent hung workflows
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Use latest v4

      - name: Set up Go
        uses: actions/setup-go@v5 # Use latest v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_SUM_FILE }}
          cache: true # Enable Go module caching

      - name: Build
        run: go build -v -o dataharbor-backend

      - name: Verify executable
        run: |
          if [[ ! -f "dataharbor-backend" ]]; then
            echo "::error::No executable was produced by the build"
            exit 1
          fi

  test-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Prevent hung workflows
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Use latest v4

      - name: Set up Go
        uses: actions/setup-go@v5 # Use latest v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_SUM_FILE }}
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test and Coverage
        id: test_coverage
        run: |
          go test -v ./... -covermode=count -coverprofile=coverage.out
          go tool cover -func=coverage.out -o=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v4 # Use latest v4
        with:
          name: coverage-report
          path: "./app/coverage.out"
          retention-days: 14

      - name: Generate Coverage Badge
        if: github.event_name != 'pull_request'
        uses: tj-actions/coverage-badge-go@v2 # Use latest v2
        with:
          filename: "./app/coverage.out"

      - name: Verify Changed files
        if: github.event_name != 'pull_request'
        uses: tj-actions/verify-changed-files@v20 # Use latest v20
        id: verify-changed-files
        with:
          files: README.md

      - name: Commit changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Action"
          git add ../README.md
          git commit -m "chore: Updated coverage badge."

      - name: Push changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        uses: ad-m/github-push-action@master # Use master branch
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref || github.ref_name }}

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Separate timeout for linting
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Use latest v4

      - name: Set up Go
        uses: actions/setup-go@v5 # Use latest v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_SUM_FILE }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6 # Use latest v6
        with:
          version: latest
          working-directory: "./app/"
          args: --timeout=5m # Add timeout to avoid linting getting stuck

  # Job to run integration tests and benchmarks
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Separate timeout for integration tests
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_SUM_FILE }}
          cache: true

      - name: Run Integration Tests
        run: |
          echo "Running comprehensive integration tests for XRD client functionality..."
          cd test && go test -v -timeout=2m

      - name: Run Benchmark Tests
        run: |
          echo "Running performance benchmark tests for critical XRD operations..."
          cd test && go test -bench=. -benchtime=200ms -timeout=2m | tee benchmark_results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: "./app/test/benchmark_results.txt"
          retention-days: 7

      - name: Verify Integration Test Coverage
        run: |
          echo "Verifying integration test coverage..."
          cd test && go test -cover -coverprofile=integration_coverage.out
          echo "Integration test coverage summary:"
          go tool cover -func=integration_coverage.out | tail -1

      - name: Upload integration test coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report
          path: "./app/test/integration_coverage.out"
          retention-days: 7

  # Job to build backend RPM package using the reusable workflow
  build-rpm:
    needs: [build, test-and-coverage, lint, integration-tests] # Only build RPM if other jobs succeed
    uses: ./.github/workflows/build-rpm.yml
    with:
      component: "backend"
      is_pr_build: ${{ github.event_name == 'pull_request' }}
