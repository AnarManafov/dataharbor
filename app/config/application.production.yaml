env: production

server:
  address: ":8080"
  debug: false
  shutdown_timeout: 30s
  cors:
    allow_credentials: true
    allow_headers:
      - Origin
      - Content-Length
      - Content-Type
      - Authorization
    allow_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allow_origins:
      - https://yourdomain.com  # Replace with your production domain
  ssl:
    enabled: true
    cert_file: "/etc/ssl/dataharbor/server.crt"
    key_file: "/etc/ssl/dataharbor/server.key"

# Unified logging configuration optimized for production
logging:
  level: info
  format: json
  console:
    enabled: true
    level: info
    format: json
  file:
    enabled: true
    level: info
    format: json
    filename: "/var/log/dataharbor/app.log"
    maxsize: 100
    maxbackups: 10
    maxage: 30
    compress: true

xrd:
  host: "xrootd-server.yourdomain.com"  # Replace with your production XRootD server
  port: 1094
  initial_dir: "/data"
  user: "service-account"
  usergroup: "data-access"
  enable_ztn: true  # ZTN protocol: TLS + OAuth token authentication (true for production)
  client_cert: "/etc/ssl/dataharbor/client.crt"
  client_key: "/etc/ssl/dataharbor/client.key"

# Frontend configuration for locating and serving UI assets
frontend:
  url: "https://yourdomain.com"  # Production URL
  dist_dir: "dist"
  asset_paths:
    - "/var/www/dataharbor"    # Primary production path
    - "/opt/dataharbor/web"    # Secondary production path

auth:
  enabled: true
  skip_auth_paths:
    - "/health"
    - "/api/auth/login"
    - "/api/auth/callback"
  oidc:
    issuer: "https://id.yourdomain.com/realms/prod"  # Production identity provider
    client_id: "dataharbor-prod"
    client_secret: "${DATAHARBOR_CLIENT_SECRET}"  # Fill this in with your secret or use ${DATAHARBOR_CLIENT_SECRET}
    discovery_url: "https://id.yourdomain.com/realms/prod/.well-known/openid-configuration"
    allowed_roles:
      - "xrootd-user"
    session_secret: "${DATAHARBOR_SESSION_SECRET}"  # Fill this in with a secure random string or use ${DATAHARBOR_SESSION_SECRET}
    token_refresh_buffer_sec: 60  # Refresh tokens 1 minute before expiration
