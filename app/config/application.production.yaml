env: production

server:
  address: ":8080"
  port: 22000
  debug: false
  shutdown_timeout: 30s
  cors:
    allow_credentials: true
    allow_headers:
      - Origin
      - Content-Length
      - Content-Type
      - Authorization
    allow_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allow_origins:
      - https://yourdomain.com  # Replace with your production domain
  ssl:
    enabled: true
    cert_file: "/etc/ssl/data-lake-ui/server.crt"
    key_file: "/etc/ssl/data-lake-ui/server.key"

log:
  format: json  # Using json format for better log processing in production
  level: info   # Appropriate level for production (not too verbose)

xrd:
  host: "xrootd-server.yourdomain.com"  # Replace with your production XRootD server
  port: 1094
  initial_dir: "/data"
  xrd_client_bin_path: "/usr/bin/"
  process_timeout: 120           # Increased timeout for production workloads (in seconds)
  staging_path: "/var/lib/data-lake-ui/staging"
  staging_tmp_dir_prefix: "stg_"
  sanitation_job_interval: 60   # In minutes
  url: "root://xrootd-server.yourdomain.com:1094"
  user: "service-account"
  usergroup: "data-access"
  userpwd: ""  # Set via environment variable in production
  user_required: true
  tls: true
  client_cert: "/etc/ssl/data-lake-ui/client.crt"
  client_key: "/etc/ssl/data-lake-ui/client.key"

# Frontend configuration for locating and serving UI assets
frontend:
  url: "https://yourdomain.com"  # Production URL
  dist_dir: "dist"
  asset_paths:
    - "/var/www/data-lake-ui"    # Primary production path
    - "/opt/data-lake-ui/web"    # Secondary production path

# Logger configuration for zap logger
logger:
  console:
    level: "info"
    driver: "console"
  file:
    level: "info"
    driver: "file"
    filename: "/var/log/data-lake-ui/app.log"  # Production log path
    maxsize: 100
    maxbackups: 10
    maxage: 30
    compress: true

auth:
  enabled: true
  skip_auth_paths:
    - "/health"
    - "/api/auth/login"
    - "/api/auth/callback"
  oidc:
    issuer: "https://id.yourdomain.com/realms/prod"  # Production identity provider
    client_id: "data-lake-ui-prod"
    client_secret: "${DATA_LAKE_UI_CLIENT_SECRET}"  # Fill this in with your secret or use ${DATA_LAKE_UI_CLIENT_SECRET}
    discovery_url: "https://id.yourdomain.com/realms/prod/.well-known/openid-configuration"
    allowed_roles:
      - "xrootd-user"
    session_secret: "${DATA_LAKE_UI_SESSION_SECRET}"  # Fill this in with a secure random string or use ${DATA_LAKE_UI_SESSION_SECRET}
