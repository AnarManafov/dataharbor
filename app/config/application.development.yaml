env: development

server:
  address: ":22000"
  debug: true
  shutdown_timeout: 30s
  cors:
    allow_credentials: true
    allow_headers:
      - Origin
      - Content-Length
      - Content-Type
      - Authorization
    allow_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allow_origins:
      - http://localhost:5173
      - https://localhost:5173
      - http://localhost:8080
      - https://localhost:8080
      - http://localhost:8081
      - https://localhost:8081
  ssl:
    enabled: true
    cert_file: "config/server.crt"
    key_file: "config/server.key"

# Unified logging configuration optimized for development
logging:
  level: debug
  format: text
  console:
    enabled: true
    level: debug
    format: text
  file:
    enabled: true
    level: debug
    format: json
    filename: "./log/dataharbor_app.log"
    maxsize: 10
    maxbackups: 2
    maxage: 7
    compress: true

xrd:
  host: "localhost"
  port: 1094
  initial_dir: "/tmp"
  user: ""
  usergroup: ""
  enable_ztn: false  # ZTN protocol: TLS + OAuth token authentication (false for local dev)
  client_cert: ""
  client_key: ""

frontend:
  url: "https://localhost:5173"
  dist_dir: "dist"
  asset_paths:
    - "../sandbox/public"
    - "web"

auth:
  enabled: true
  skip_auth_paths:
    - "/health"
    - "/api/auth/login"
    - "/api/auth/callback"
  oidc:
    issuer: "https://id.gsi.de/realms/wl"
    client_id: "xrootd"
    client_secret: ""
    discovery_url: "https://id.gsi.de/realms/wl/.well-known/openid-configuration"
    allowed_roles:
      - "xrootd-user"
    session_secret: "5f9d7b8e-3a1c-4d86-9f2e-6b7c8d9e4f3a"
    token_refresh_buffer_sec: 60  # Refresh tokens 1 minute before expiration