# DataHarbor Frontend - Simple HTTP Configuration
# This is a basic configuration for non-production environments
# For production, use nginx-https-proxy.conf or nginx-gsi.conf

server {
    listen 80;
    server_name localhost;

    # Frontend static files
    root /usr/share/dataharbor-frontend;
    index index.html;

    # Serve frontend (SPA - Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        alias /usr/share/dataharbor-frontend/assets/;
        expires max;
        access_log off;
        add_header Cache-Control "public";
    }

    # Logging
    error_log /var/log/nginx/dataharbor-frontend-error.log;
    access_log /var/log/nginx/dataharbor-frontend-access.log;
}

# NOTE: With this configuration, frontend config.json should have:
# "apiBaseUrl": "https://your-backend-server:8081/api"
# 
# Replace with your actual backend server address and port
