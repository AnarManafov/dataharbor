# DataHarbor Frontend - GSI-Specific Configuration
# For GSI servers with XRootD on port 80
# DataHarbor uses port 443 (HTTPS) with reverse proxy to backend

server {
    listen 443 ssl http2;
    server_name punch2.gsi.de;  # Replace with your GSI server hostname

    # SSL Configuration
    # GSI uses certificates from GEANT CA
    ssl_certificate /etc/ssl/certs/punch2.gsi.de.pem;
    ssl_certificate_key /etc/ssl/private/punch2.gsi.de.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # SSL session cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Frontend static files
    root /usr/share/dataharbor-frontend;
    index index.html;

    # Serve frontend (SPA - Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        alias /usr/share/dataharbor-frontend/assets/;
        expires max;
        access_log off;
        add_header Cache-Control "public";
    }

    # Reverse proxy to backend API
    location /api/ {
        # GSI backend typically runs on port 22000
        proxy_pass https://localhost:22000;
        
        # Disable SSL verification for self-signed certificates
        proxy_ssl_verify off;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts (increase for large file operations)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Logging
    error_log /var/log/nginx/dataharbor-frontend-error.log;
    access_log /var/log/nginx/dataharbor-frontend-access.log;
}

# IMPORTANT NOTES:
# 1. Replace "punch2.gsi.de" with your actual GSI server hostname
# 2. Update SSL certificate paths to match your server's certificates
# 3. Port 80 is NOT used (XRootD HTTP service uses it)
# 4. Backend port is 22000 (standard for GSI deployment)
# 5. Frontend config.json should have: "apiBaseUrl": "/api"
# 6. Comment out default nginx server block to avoid port 80 conflicts
