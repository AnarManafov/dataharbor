# DataHarbor Frontend - HTTPS with Reverse Proxy (Recommended for Production)
# This configuration provides HTTPS and proxies API requests to the backend

server {
    # HTTP to HTTPS redirect
    listen 80;
    server_name your-hostname.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-hostname.example.com;

    # SSL Configuration
    # Replace these paths with your actual SSL certificate paths
    ssl_certificate /etc/ssl/certs/your-server.crt;
    ssl_certificate_key /etc/ssl/private/your-server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # SSL session cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Frontend static files
    root /usr/share/dataharbor-frontend;
    index index.html;

    # Serve frontend (SPA - Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        alias /usr/share/dataharbor-frontend/assets/;
        expires max;
        access_log off;
        add_header Cache-Control "public";
    }

    # Reverse proxy to backend API
    location /api/ {
        # Proxy to backend (adjust port if different)
        proxy_pass https://localhost:8081;
        
        # Disable SSL verification for self-signed certificates
        # Remove this line if using proper CA-signed certificates
        proxy_ssl_verify off;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Logging
    error_log /var/log/nginx/dataharbor-frontend-error.log;
    access_log /var/log/nginx/dataharbor-frontend-access.log;
}

# IMPORTANT: Update the following before using:
# 1. Replace "your-hostname.example.com" with your actual domain/hostname
# 2. Update SSL certificate paths to match your certificates
# 3. Adjust backend port (default: 8081) if different
# 4. Frontend config.json should have: "apiBaseUrl": "/api"
