# nginx.conf
server {
    listen 80;
    server_name data-lake-ui;

    root /usr/share/data-lake-ui-frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_log /var/log/nginx/data-lake-ui-frontend-error.log;
    access_log /var/log/nginx/data-lake-ui-frontend-access.log;
}
