<svg width="180" height="40" viewBox="0 0 180 40" fill="none"
    xmlns="http://www.w3.org/2000/svg">
    <!-- Harbor/Dock Icon -->
    <g>
        <!-- Water waves -->
        <path d="M2 32 C6 30, 10 34, 14 32 C18 30, 22 34, 26 32 C30 30, 34 34, 38 32" stroke="currentColor" stroke-width="2" fill="none" opacity="0.6"/>
        <path d="M2 35 C6 33, 10 37, 14 35 C18 33, 22 37, 26 35 C30 33, 34 37, 38 35" stroke="currentColor" stroke-width="2" fill="none" opacity="0.4"/>

        <!-- Storage containers/data blocks -->
        <rect x="4" y="18" width="8" height="12" rx="1" fill="currentColor" opacity="0.8"/>
        <rect x="14" y="15" width="8" height="15" rx="1" fill="currentColor" opacity="0.9"/>
        <rect x="24" y="12" width="8" height="18" rx="1" fill="currentColor"/>

        <!-- Connection lines representing data flow -->
        <circle cx="8" cy="22" r="1" fill="currentColor"/>
        <circle cx="18" cy="19" r="1" fill="currentColor"/>
        <circle cx="28" cy="16" r="1" fill="currentColor"/>
        <line x1="9" y1="22" x2="17" y2="19" stroke="currentColor" stroke-width="1" opacity="0.6"/>
        <line x1="19" y1="19" x2="27" y2="16" stroke="currentColor" stroke-width="1" opacity="0.6"/>
    </g>

    <!-- Text -->
    <text x="45" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="currentColor">
    DataHarbor
    </text>
    <text x="45" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="currentColor" opacity="0.7">
    Data Management Platform
    </text>
</svg>
